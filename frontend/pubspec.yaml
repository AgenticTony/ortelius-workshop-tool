name: workshop_tool
description: "Workshop support tool — capture, cluster, and report workshop ideas."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP client (interceptors attach the facilitator bearer token)
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Environment config (.env for the backend URL)
  flutter_dotenv: ^5.2.1

  # Secure storage for the facilitator bearer token
  flutter_secure_storage: ^9.2.2
  qr_flutter: ^4.1.0
  web: ^1.1.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation for Riverpod + immutable models
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  json_serializable: ^6.8.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - .env
