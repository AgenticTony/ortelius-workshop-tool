# Render Blueprint — Workshop Tool
#
# Deploys the full stack (managed Postgres + FastAPI + Flutter web) from one
# config file. Apply via the Render dashboard: New → Blueprint → pick this
# repo → Render reads render.yaml and creates the services.
#
# Secrets (set in the Render dashboard before first deploy):
#   CLAUDE_API_KEY   — your Anthropic key (required for /analyse)
#
# After the first deploy, the API's DATABASE_URL is wired to the managed
# Postgres automatically. Migrations run on every boot via the entrypoint
# (`alembic upgrade head`).
# See docs/deployment.md for the full walkthrough.

databases:
  # ── Managed Postgres ───────────────────────────────────────
  # Free tier: expires after 90 days — fine for a prototype, move to a paid
  # plan for persistence.
  - name: workshop-db
    region: frankfurt   # change to your nearest region
    plan: free

services:
  # ── Backend API (FastAPI) ──────────────────────────────────
  - type: web
    name: workshop-api
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Render injects DATABASE_URL pointing at the workshop-db database above.
      - key: DATABASE_URL
        fromDatabase:
          name: workshop-db
          property: connectionString
      - key: CLAUDE_API_KEY
        sync: false   # secret — set in the dashboard
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5-20250929
      # CORS: the Flutter web origin. Must be an explicit origin — the API's
      # production config (APP_ENV=production, set in the Dockerfile) rejects
      # CORS_ORIGINS='*' at boot, which would crash-loop the container.
      - key: CORS_ORIGINS
        value: "https://workshop-web-1gvl.onrender.com"

  # ── Frontend (Flutter web → nginx) ─────────────────────────
  - type: web
    name: workshop-web
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeploy: true
    # Bake the API service URL into the web build at build time so the deployed
    # image talks to workshop-api directly (the app's origin-derived fallback
    # only works when frontend & API share a host, which they don't on Render).
    envVars:
      - key: API_BASE_URL
        value: https://workshop-api-8yjy.onrender.com
