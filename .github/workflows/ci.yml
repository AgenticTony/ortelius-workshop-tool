name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        # Tests use SQLite via conftest, but app.config.settings.database_url
        # is read at import time (create_engine). Give it a valid placeholder
        # so import doesn't fail; the tests override get_db anyway.
        env:
          DATABASE_URL: "sqlite:///./ci-placeholder.db"
        run: pytest tests/ -v

      # Dependency vulnerability gate (production deps). pip-audit resolves
      # requirements.txt and fails the build on any known CVE. If a finding
      # appears, bump the pinned version (or, if no fixed release exists yet,
      # add an `--ignore-vuln` for the specific ID with a comment tracking it).
      - name: Dependency scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict

  frontend:
    name: Frontend (flutter analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # pubspec declares .env as an asset; it's gitignored, so stub it for CI.
      - name: Create .env stub
        run: cp .env.example .env

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
